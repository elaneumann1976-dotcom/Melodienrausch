<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELODIENRAUSCH // WERKE — VORSCHAU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  html, body {
    background-color: #ffffff;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0; padding: 0;
    box-sizing: border-box;
    cursor: none;
    overflow-x: hidden;
  }

  .custom-cursor {
    width: 14px; height: 14px;
    background-color: #000000;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 999999 !important;
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .gallery-header {
    position: fixed; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 30px 40px; box-sizing: border-box; z-index: 200;
    background: rgba(255,255,255,0.92);
  }

  .huge-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(24px, 5vw, 90px);
    font-weight: 700; line-height: 0.8; letter-spacing: -2px;
    text-transform: uppercase; margin: 0;
  }

  .scroll-hint {
    font-family: 'Oswald', sans-serif; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase; opacity: 0.5;
  }

  .gallery-wrap {
    padding-top: 160px;
    height: 400vh; /* genug Scroll-Strecke für den Effekt */
    position: relative;
  }

  .row {
    display: flex;
    gap: 24px;
    padding: 12px 0;
    will-change: transform;
  }

  .row:nth-child(odd)  { padding-left: 6vw; }
  .row:nth-child(even) { padding-left: -6vw; margin-left: -6vw; }

  .card {
    position: relative;
    flex: 0 0 auto;
    width: 320px; height: 220px;
    background-color: #000000;
    color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .card:nth-child(3n+1) { background-color: #000000; }
  .card:nth-child(3n+2) { background-color: #1a1a1a; }
  .card:nth-child(3n)   { background-color: #2e2e2e; }

  .card .num {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 64px; opacity: 0.85;
  }

  .card.clicked {
    transform: scale(1.06);
  }

  /* Titel-Overlay nach Klick */
  .title-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .title-overlay.active { opacity: 1; pointer-events: auto; }

  .title-overlay .werk-num {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 20px;
    letter-spacing: 4px; opacity: 0.5; margin-bottom: 20px;
  }
  .title-overlay h2 {
    font-family: 'Oswald', sans-serif; font-weight: 700; text-transform: uppercase;
    font-size: clamp(28px, 6vw, 80px); margin: 0; text-align: center; letter-spacing: -1px;
  }
  .title-overlay .goto-detail {
    margin-top: 40px; font-family: 'Oswald', sans-serif; font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #000;
    padding-bottom: 4px; cursor: none;
  }
</style>
</head>
<body>

  <div class="custom-cursor" id="cursor"></div>

  <div class="gallery-header">
    <h1 class="huge-title">WERKE®</h1>
    <div class="scroll-hint">Scroll to surf</div>
  </div>

  <div class="gallery-wrap" id="galleryWrap">
    <!-- Reihen werden per JS erzeugt -->
  </div>

  <div class="title-overlay" id="titleOverlay">
    <div class="werk-num" id="ovNum">#01</div>
    <h2 id="ovTitle">Werktitel erscheint hier</h2>
    <div class="goto-detail" onclick="closeOverlay()">Zur Werkseite →</div>
  </div>

<script>
  // ---- Platzhalter-Daten (später echte Werke + Bilder eintragen) ----
  const werke = [];
  for (let i = 1; i <= 16; i++) {
    werke.push({ num: String(i).padStart(2,'0'), title: 'Werk ' + String(i).padStart(2,'0') + ' — Platzhaltertitel' });
  }

  const wrap = document.getElementById('galleryWrap');
  const rowsCount = 4;
  const rowEls = [];

  for (let r = 0; r < rowsCount; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.position = 'sticky';
    row.style.top = (160 + r * 260) + 'px';
    for (let i = r; i < werke.length; i += rowsCount) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.num = werke[i].num;
      card.dataset.title = werke[i].title;
      card.innerHTML = '<span class="num">' + werke[i].num + '</span>';
      card.addEventListener('click', () => openOverlay(card));
      row.appendChild(card);
    }
    wrap.appendChild(row);
    rowEls.push(row);
  }

  // ---- Cursor ----
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  });

  // ---- Scroll-Velocity → unterschiedlicher Versatz je Reihe ----
  let lastScroll = window.scrollY;
  let lastTime = performance.now();
  let velocity = 0;
  let offsets = new Array(rowsCount).fill(0);

  function loop(now) {
    const dt = Math.max(now - lastTime, 1);
    const currentScroll = window.scrollY;
    const dy = currentScroll - lastScroll;
    const rawVelocity = dy / dt * 16; // normalisiert auf ~60fps-Schritt
    velocity += (rawVelocity - velocity) * 0.15; // glätten

    rowEls.forEach((row, i) => {
      // ungerade Reihen laufen gegenläufig -> Parallax-Tiefe
      const direction = i % 2 === 0 ? 1 : -1;
      const speedFactor = 0.6 + i * 0.35; // jede Reihe unterschiedlich schnell
      offsets[i] += velocity * speedFactor * direction * -0.4;
      offsets[i] = Math.max(Math.min(offsets[i], 400), -400); // Grenzen
      row.style.transform = `translateX(${offsets[i]}px)`;
    });

    lastScroll = currentScroll;
    lastTime = now;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---- Klick-Animation + Titel-Overlay ----
  const overlay = document.getElementById('titleOverlay');
  const ovNum = document.getElementById('ovNum');
  const ovTitle = document.getElementById('ovTitle');

  function openOverlay(card) {
    card.classList.add('clicked');
    setTimeout(() => {
      ovNum.textContent = '#' + card.dataset.num;
      ovTitle.textContent = card.dataset.title;
      overlay.classList.add('active');
    }, 350);
    setTimeout(() => card.classList.remove('clicked'), 500);
  }

  function closeOverlay() {
    overlay.classList.remove('active');
    // Hier später: window.location.href = 'werke.html?id=' + ovNum.textContent
  }
</script>
</body>
</html>
