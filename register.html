<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MELODIENRAUSCH // ARCHIVE</title>
  <style>
    @import url('https://googleapis.com');
    :root { --bg: #0a0a0a; --fg: #ece7dd; --accent: #d97a3c; --muted: #444444; }
    html, body { background-color: var(--bg) !important; color: var(--fg); font-family: "IBM Plex Mono", monospace; margin: 0; padding: 0; box-sizing: border-box; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
    .custom-cursor { width: 12px; height: 12px; background-color: var(--fg); position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999 !important; transform: translate(-50%, -50%) rotate(45deg); will-change: transform; }
    header { padding: 4rem 2rem 2rem 2rem; border-bottom: 1px solid var(--muted); display: flex; justify-content: space-between; align-items: flex-end; }
    header h1 { font-family: "Arial Black", sans-serif; font-size: clamp(2.2rem, 7vw, 4.5rem); margin: 0; letter-spacing: -0.04em; line-height: 0.9; text-transform: uppercase; }
    header .index-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted); margin-bottom: 0.8rem; }
    .menu-icon { display: flex; flex-direction: column; justify-content: space-between; width: 28px; height: 14px; cursor: none; margin-bottom: 8px; z-index: 1010; pointer-events: auto; }
    .menu-icon span { display: block; width: 100%; height: 2px; background-color: var(--fg); transition: all 0.25s ease; }
    body.menu-open .menu-icon span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    body.menu-open .menu-icon span:nth-child(2) { opacity: 0; }
    body.menu-open .menu-icon span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    .side-menu { position: fixed; top: 0; right: -420px; width: 380px; height: 100vh; background-color: #0f0f0f; border-left: 1px solid var(--muted); box-sizing: border-box; padding: 120px 30px 40px 30px; z-index: 1000; transition: right 0.4s ease; display: flex; flex-direction: column; gap: 8px; }
    body.menu-open .side-menu { right: 0; }
    .menu-link { font-family: 'Oswald', sans-serif; font-size: 28px; color: var(--fg); text-transform: uppercase; padding: 12px 16px; text-decoration: none; display: block; cursor: none; }
    .menu-link:hover { color: var(--accent); }
    .register-section { padding: 4rem 2rem; }
    .ordner-reihe { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 2rem; }
    .mappen-container { width: 290px; height: 190px; perspective: 1500px; position: relative; }
    .mappe { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
    .mappen-rueckseite, .mappen-deckel { position: absolute; width: 100%; height: 100%; border: 1px solid var(--muted); background: #000; box-shadow: 6px 6px 0px #111; box-sizing: border-box; }
    .mappen-deckel { z-index: 3; transform-origin: top center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); padding: 15px; display: flex; flex-direction: column; justify-content: space-between; background: var(--fg); color: var(--bg); border: 1px solid var(--fg); }
    .mappen-titel { font-family: 'Oswald', sans-serif; font-size: 16px; text-transform: uppercase; }
    .mappen-code { font-size: 10px; font-weight: bold; color: var(--accent); }
    .register-inhalt { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; background: #050505; padding: 15px; border: 1px solid var(--muted); opacity: 0; transition: opacity 0.3s; font-size: 11px; overflow-y: auto; color: var(--fg); line-height: 1.5; }
    .mappen-container.offen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.4); z-index: 999; width: 420px; height: 260px; }
    .mappen-container.offen .mappen-deckel { transform: rotateX(145deg); background: #151515; color: var(--fg); border-color: var(--muted); }
    .mappen-container.offen .register-inhalt { opacity: 1; transition-delay: 0.3s; }
    .mappen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.85); z-index: 900; display: none; }
    body.has-open-folder .mappen-overlay { display: block; }
    footer { padding: 2rem; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: auto; }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>
  <div class="mappen-overlay" onclick="schliesseAlleMappen()"></div>
  <div class="side-menu">
    <a href="index.html" class="menu-link">Heimat</a>
    <a href="register.html" class="menu-link">Register</a>
    <a href="kontakt.html" class="menu-link">Kontakt</a>
  </div>
  <header>
    <div><div class="index-tag">Index — System-Archiv</div><h1>MELODIENRAUSCH<sup>®</sup></h1></div>
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  </header>
  <main class="register-section">
    <div class="ordner-reihe">
      <div class="mappen-container" onclick="toggleMappe(this)">
        <div class="mappe">
          <div class="mappen-rueckseite"><div class="register-inhalt"><h3>AKTE #001: TINTE & BETON</h3><p>Analyse analoger Rückkopplungen im leeren Urban-Raum. Aufzeichnung abgebrochen wegen Übersteuerung der analogen Wandler.</p></div></div>
          <div class="mappen-deckel"><span class="mappen-code">[DOK-L02]</span><span class="mappen-titel">Tinte & Beton</span></div>
        </div>
      </div>
    </div>
  </main>
  <footer>ogcvisualz &nbsp;/&nbsp; mail@melodienrausch.de</footer>
  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => { cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) rotate(45deg)`; });
    function toggleMenu() { document.body.classList.toggle('menu-open'); }
    function toggleMappe(e) { e.classList.contains('offen') ? schliesseAlleMappen() : (schliesseAlleMappen(), e.classList.add('offen'), document.body.classList.add('has-open-folder')); }
    function schliesseAlleMappen() { document.querySelectorAll('.mappen-container').forEach(m => m.classList.remove('offen')); document.body.classList.remove('has-open-folder'); }
  </script>
</body>
</html>
