<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELODIENRAUSCH // REGISTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  html, body {
    background-color: #ffffff; color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0; padding: 0; box-sizing: border-box; cursor: none; overflow-x: hidden;
  }

  .custom-cursor {
    width: 14px; height: 14px; background-color: #000000;
    position: fixed; top: 0; left: 0; pointer-events: none;
    z-index: 999999 !important; transform: translate(-50%, -50%) rotate(45deg);
  }

  .main-content { opacity: 0; transition: opacity 0.8s ease; min-height: 100vh; }
  body.intro-done .main-content { opacity: 1; }

  .hero-header {
    position: fixed; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 30px 40px 10px 40px; box-sizing: border-box; z-index: 300;
    background: rgba(255,255,255,0.92);
  }
  .huge-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(24px, 5vw, 90px); font-weight: 700; line-height: 0.8;
    letter-spacing: -2px; text-transform: uppercase; margin: 0; white-space: nowrap;
  }
  .menu-icon {
    display: flex; flex-direction: column; justify-content: space-between;
    width: 30px; height: 16px; cursor: none; margin-bottom: 8px; z-index: 1001;
    pointer-events: auto;
  }
  .menu-icon span { display: block; width: 100%; height: 2px; background-color: #000000; transition: all 0.3s ease-in-out; }
  body.menu-open .menu-icon span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  body.menu-open .menu-icon span:nth-child(2) { opacity: 0; }
  body.menu-open .menu-icon span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .side-menu {
    position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
    background-color: #f7f7f7; border-left: 1px solid #e0e0e0;
    box-sizing: border-box; padding: 120px 40px 40px 40px; z-index: 1000;
    transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
    display: flex; flex-direction: column; gap: 10px;
  }
  body.menu-open .side-menu { right: 0; }
  .menu-link {
    font-family: 'Oswald', sans-serif; font-size: 32px; color: #000000;
    text-decoration: none; text-transform: uppercase; padding: 15px 20px;
    border: 1px solid transparent; transition: all 0.2s ease; display: block; cursor: none;
  }
  .menu-link:hover { background-color: #ffffff; border-color: #000000; padding-left: 30px; }
  .menu-link.active { background-color: #000000; color: #ffffff; }
  .menu-link.active:hover { background-color: #000000; color: #ffffff; padding-left: 20px; border-color: #000000; }

  /* ===== BUCH-B\u00dcHNE ===== */
  .book-stage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 160px 20px 100px 20px; box-sizing: border-box;
    perspective: 2800px;
  }

  .book-outer {
    position: relative;
    width: min(920px, 94vw);
    height: min(640px, 72vh);
    background: #000000;
    padding: 16px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 4px 10px rgba(0,0,0,0.15);
    border-radius: 2px;
  }

  .book-inner {
    position: relative; width: 100%; height: 100%;
    display: flex; background: #fdfdfb;
  }

  .book-spine {
    position: absolute; top: 0; left: 50%; width: 40px; height: 100%;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.05) 20%,
      rgba(0,0,0,0.02) 50%,
      rgba(0,0,0,0.05) 80%, rgba(0,0,0,0.18) 100%);
    z-index: 50; pointer-events: none;
  }

  .page-left, .page-right-stack {
    width: 50%; height: 100%; position: relative; overflow: hidden;
  }

  .page-left {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; box-sizing: border-box; border-right: 1px solid rgba(0,0,0,0.06);
  }
  .page-left .index-big {
    font-family: 'Oswald', sans-serif; font-weight: 700; opacity: 0.08;
    font-size: clamp(80px, 14vw, 220px); line-height: 1; letter-spacing: -6px;
  }
  .page-left .index-label {
    font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; opacity: 0.35; margin-top: -20px;
  }

  .page {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    box-sizing: border-box; transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 0.85s cubic-bezier(0.45, 0, 0.2, 1);
  }
  .page.flipped { transform: rotateY(-178deg); }

  .page-face {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden; box-sizing: border-box;
    padding: 44px 40px; overflow-y: auto; background: #fdfdfb;
  }
  .page-face.back {
    transform: rotateY(180deg);
    background: #f7f6f2;
    display: flex; align-items: center; justify-content: center;
  }
  .page-face.back .watermark {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase; opacity: 0.15;
    writing-mode: vertical-rl;
  }

  .page-curl-shadow {
    position: absolute; top: 0; right: 0; width: 60px; height: 100%;
    background: linear-gradient(to left, rgba(0,0,0,0.12), transparent);
    opacity: 0; transition: opacity 0.85s ease; pointer-events: none;
  }
  .page.flipped .page-curl-shadow { opacity: 1; }

  .page-num { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; margin-bottom: 22px; }
  .page-face h2 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(20px, 2.6vw, 28px); text-transform: uppercase; margin: 0 0 22px 0; letter-spacing: -0.5px; }
  .typewriter-line { font-size: 14px; line-height: 1.7; margin: 0 0 16px 0; }
  .typewriter-line .cursor-blink {
    display: inline-block; width: 2px; height: 1em; background: #000;
    margin-left: 2px; vertical-align: -0.15em; animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .rest-text { font-size: 14px; line-height: 1.7; opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .rest-text.visible { opacity: 1; transform: translateY(0); }
  .rest-text p { margin: 0 0 16px 0; }

  .book-nav { display: flex; align-items: center; gap: 30px; margin-top: 26px; font-family: 'Oswald', sans-serif; }
  .book-nav button {
    background: none; border: 2px solid #000; color: #000;
    font-family: inherit; font-size: 22px; padding: 8px 20px;
    cursor: none; letter-spacing: 2px; transition: all 0.2s ease;
  }
  .book-nav button:hover:not(:disabled) { background: #000; color: #fff; }
  .book-nav button:disabled { opacity: 0.25; }
  .book-nav .counter { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }

  .skip-hint { margin-top: 14px; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.3; }

  @media (max-width: 640px) {
    .page-left { display: none; }
    .page-right-stack { width: 100%; }
    .book-spine { display: none; }
  }
</style>
</head>
<body>

  <div id="intro-screen" style="position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; z-index:9999999; transition:opacity 0.6s ease;">
    <div style="font-family:'Courier New'; font-size:24px; letter-spacing:10px; text-transform:uppercase; font-weight:bold;">melodienrausch</div>
  </div>
  <div class="custom-cursor" id="cursor"></div>

  <div class="side-menu">
    <a href="index.html" class="menu-link">Heimat</a>
    <a href="werke.html" class="menu-link">Werke</a>
    <a href="ueber.html" class="menu-link">Über</a>
    <a href="register.html" class="menu-link active">Register</a>
    <a href="kontakt.html" class="menu-link">Kontakt</a>
  </div>

  <div class="main-content">
    <div class="hero-header">
      <h1 class="huge-title">MELODIENRAUSCH®</h1>
      <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </div>

    <div class="book-stage">
      <div class="book-outer">
        <div class="book-inner">
          <div class="page-left">
            <div class="index-big" id="leftIndexBig">#01</div>
            <div class="index-label">Register — Melodienrausch</div>
          </div>
          <div class="page-right-stack" id="book"></div>
          <div class="book-spine"></div>
        </div>
      </div>

      <div class="book-nav">
        <button id="prevBtn" onclick="prevPage()">◂</button>
        <span class="counter" id="counter">1 / 2</span>
        <button id="nextBtn" onclick="nextPage()">▸</button>
      </div>
      <div class="skip-hint">Klick auf die Seite überspringt die Schreib-Animation · Pfeiltasten funktionieren auch</div>
    </div>
  </div>

<script>
  // ---- DEINE EINTRÄGE — neuen Block einfach unten anfügen ----
  const entries = [
    {
      num: '002', title: 'Nicht ich zu wenig',
      firstLine: 'Vielleicht ist es gerade einfach zu viel.',
      rest: [
        'Nicht ich zu wenig. Der Tag war voll, der Kopf noch voller — und irgendwo dazwischen ist der Gedanke hängen geblieben.',
        'Ich schreib das hier nicht, weil es fertig ist. Sondern weil es gerade so ist.'
      ]
    },
    {
      num: '001', title: 'Bass & Stille',
      firstLine: 'Das hier ist kein Portfolio, sondern ein digitales Underground-Magazin.',
      rest: [
        'Kein glattes Konzept, keine fertige Geschichte. Nur das, was gerade zieht — Bass, Stille, und alles dazwischen.'
      ]
    }

    // NEUEN EINTRAG HIER EINFÜGEN (Vorlage zum Kopieren):
    // ,{
    //   num: '003',
    //   title: 'Dein Titel',
    //   firstLine: 'Der erste Satz, der getippt wird.',
    //   rest: [ 'Erster Absatz.', 'Zweiter Absatz, falls nötig.' ]
    // }
  ];

  const bookEl = document.getElementById('book');
  const leftIndexBig = document.getElementById('leftIndexBig');
  let currentPage = 0;
  let currentTyping = null;
  const pageEls = [];

  function buildPage(entry) {
    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
      <div class="page-face front">
        <div class="page-num">#${entry.num}</div>
        <h2>${entry.title}</h2>
        <p class="typewriter-line"><span class="typed"></span><span class="cursor-blink"></span></p>
        <div class="rest-text"></div>
      </div>
      <div class="page-face back">
        <div class="watermark">MELODIENRAUSCH</div>
      </div>
      <div class="page-curl-shadow"></div>
    `;
    return page;
  }

  entries.forEach((entry, i) => {
    const page = buildPage(entry);
    page.style.zIndex = entries.length - i;
    bookEl.appendChild(page);
    pageEls.push(page);
  });

  function typeFirstLine(page, entry) {
    const typedSpan = page.querySelector('.typed');
    const cursorBlink = page.querySelector('.cursor-blink');
    const rest = page.querySelector('.rest-text');
    typedSpan.textContent = '';
    cursorBlink.style.display = 'inline-block';
    rest.classList.remove('visible');
    rest.innerHTML = entry.rest.map(p => `<p>${p}</p>`).join('');

    let i = 0;
    function tick() {
      if (i <= entry.firstLine.length) {
        typedSpan.textContent = entry.firstLine.slice(0, i);
        i++;
        currentTyping = setTimeout(tick, 28 + Math.random() * 45);
      } else {
        cursorBlink.style.display = 'none';
        rest.classList.add('visible');
        currentTyping = null;
      }
    }
    tick();
  }

  function skipTyping(page, entry) {
    if (currentTyping) { clearTimeout(currentTyping); currentTyping = null; }
    page.querySelector('.typed').textContent = entry.firstLine;
    page.querySelector('.cursor-blink').style.display = 'none';
    page.querySelector('.rest-text').classList.add('visible');
  }

  function updateNav() {
    document.getElementById('prevBtn').disabled = (currentPage === 0);
    document.getElementById('nextBtn').disabled = (currentPage === entries.length - 1);
    document.getElementById('counter').textContent = (currentPage + 1) + ' / ' + entries.length;
    leftIndexBig.textContent = '#' + entries[currentPage].num;
  }

  function renderInitial() {
    typeFirstLine(pageEls[0], entries[0]);
    updateNav();
  }

  function nextPage() {
    if (currentPage >= entries.length - 1) return;
    pageEls[currentPage].classList.add('flipped');
    currentPage++;
    updateNav();
    setTimeout(() => typeFirstLine(pageEls[currentPage], entries[currentPage]), 400);
  }

  function prevPage() {
    if (currentPage <= 0) return;
    currentPage--;
    pageEls[currentPage].classList.remove('flipped');
    updateNav();
    setTimeout(() => typeFirstLine(pageEls[currentPage], entries[currentPage]), 400);
  }

  bookEl.addEventListener('click', () => {
    skipTyping(pageEls[currentPage], entries[currentPage]);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextPage();
    if (e.key === 'ArrowLeft') prevPage();
  });

  let touchStartX = 0;
  bookEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  bookEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) { dx < 0 ? nextPage() : prevPage(); }
  });

  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  });
  function toggleMenu() { document.body.classList.toggle('menu-open'); }
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const intro = document.getElementById('intro-screen');
      if (intro) { intro.style.opacity = '0'; setTimeout(() => intro.remove(), 600); }
      document.body.classList.add('intro-done');
    }, 2000);
    renderInitial();
  });
</script>
</body>
</html>
