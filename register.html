<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stilles Archiv</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --paper-color: #f2efe9;
            --paper-texture: #e3ded6;
            --ink-color: #1a1a1a;
            --accent-rust: #8c3b26;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--paper-color);
            font-family: monospace, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Schwebendes geschlossenes Buch in der Bildschirmmitte */
        .floating-book-container {
            position: absolute;
            cursor: pointer;
            text-align: center;
            animation: float 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .floating-book-container:hover {
            transform: scale(1.05);
        }

        .book-cover-mockup {
            width: 220px;
            height: 300px;
            background: linear-gradient(135deg, #1c1c1c, #2b2b2b);
            border: 2px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .book-cover-mockup::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: rgba(0,0,0,0.5);
        }

        .book-title {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px dashed var(--paper-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .book-hint {
            font-size: 0.75rem;
            color: #888;
        }

        /* Das geöffnete Buch (Zwei Seiten) */
        .open-book-modal {
            display: none;
            position: fixed;
            width: 800px;
            max-width: 90vw;
            height: 520px;
            background-color: var(--paper-color);
            color: var(--ink-color);
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            border: 1px solid #c2bdb4;
            display: none; /* Initial versteckt */
            grid-template-columns: 1fr 1fr;
            position: relative;
            animation: fadeIn 0.4s ease forwards;
        }

        .open-book-modal.active {
            display: grid;
        }

        /* Buchfalz in der Mitte */
        .open-book-modal::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(to right, rgba(0,0,0,0.08), rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.08));
            transform: translateX(-50%);
            pointer-events: none;
        }

        .book-page {
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* Linke Seite: Inhaltsverzeichnis / Titel */
        .page-left h3 {
            font-size: 1rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink-color);
            padding-bottom: 8px;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .blog-index-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .blog-index-list li {
            margin-bottom: 15px;
        }

        .blog-link {
            background: none;
            border: none;
            font-family: monospace, sans-serif;
            font-size: 0.95rem;
            color: var(--ink-color);
            cursor: pointer;
            text-align: left;
            padding: 0;
            transition: color 0.2s, padding-left 0.2s;
        }

        .blog-link:hover {
            color: var(--accent-rust);
            padding-left: 5px;
        }

        /* Rechte Seite: Schreibmaschinen-Ansicht & Text */
        .page-right {
            background-color: var(--paper-texture);
        }

        .typewriter-container {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .typewriter-title {
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--ink-color);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* Schließen-Button für das Buch */
        .close-book {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--ink-color);
            z-index: 10;
        }

        .close-book:hover {
            color: var(--accent-rust);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. Der schwebende Buch-Container (Ausgangspunkt) -->
    <div class="floating-book-container" id="floatingBook" onclick="openBook()">
        <div class="book-cover-mockup">
            <div class="book-title">stilleinkopf</div>
            <div class="book-hint">[ anklicken zum öffnen ]</div>
        </div>
    </div>

    <!-- 2. Das geöffnete Flipbook (Modal) -->
    <div class="open-book-modal" id="openBookModal">
        <button class="close-book" onclick="closeBook()">×</button>
        
        <!-- Linke Seite: Inhaltsverzeichnis / Titel -->
        <div class="book-page page-left">
            <h3>Inhalt / Spuren</h3>
            <ul class="blog-index-list">
                <li>
                    <button class="blog-link" onclick="loadPost('post1')">
                        01. Spuren im Betonlicht
                    </button>
                </li>
                <li>
                    <button class="blog-link" onclick="loadPost('post2')">
                        02. 890 – Blaues Echo
                    </button>
                </li>
                <li>
                    <button class="blog-link" onclick="loadPost('post3')">
                        03. Fragmente einer Nacht
                    </button>
                </li>
            </ul>
        </div>

        <!-- Rechte Seite: Schreibmaschinen-Ausgabe -->
        <div class="book-page page-right">
            <div class="typewriter-container" id="typewriterOutput">
                <span style="color: #666; font-style: italic;">Wähle links einen Titel aus dem Archiv...</span>
            </div>
        </div>
    </div>

    <script>
        // Datenbank der Blogeinträge
        const blogPosts = {
            post1: {
                title: "Spuren im Betonlicht",
                text: "Das Licht bricht sich hart an den Kanten der alten Mauern. Ein dumpfer Beat hallt aus den Kopfhörern, während die Zeilen auf das Papier gehämmert werden...\n\nEs geht um die Suche nach dem echten Moment zwischen all den digitalen Schichten. Nichts ist poliert, alles atmet den Staub der Realität."
            },
            post2: {
                title: "890 – Blaues Echo",
                text: "Frequenzen schwingen im Raum. Eine Blaupause aus Erinnerung und kühlem Metall.\n\nWenn man genau hinhört, versteht man, dass die Stille oft lauter ist als jedes gesprochene Wort. Ein Auszug aus dem analogen Logbuch."
            },
            post3: {
                title: "Fragmente einer Nacht",
                text: "Zigarettenrauch und das Surren einer alten Schreibmaschine. Die Tasten schlagen hart auf den Bogen.\n\nManchmal muss man alles verwerfen, um den wahren Kern freizulegen. Schwarz, Weiß, Beton und Tinte."
            }
        };

        const floatingBook = document.getElementById('floatingBook');
        const openBookModal = document.getElementById('openBookModal');
        const outputContainer = document.getElementById('typewriterOutput');
        
        let typingTimeout;

        function openBook() {
            floatingBook.style.display = 'none';
            openBookModal.classList.add('active');
        }

        function closeBook() {
            openBookModal.classList.remove('active');
            floatingBook.style.display = 'block';
            clearTimeout(typingTimeout);
        }

        function loadPost(postId) {
            clearTimeout(typingTimeout);
            outputContainer.innerHTML = '';
            
            const post = blogPosts[postId];
            if (!post) return;

            // Titel im Schreibmaschinenstil vorbereiten
            const titleElem = document.createElement('div');
            titleElem.className = 'typewriter-title';
            outputContainer.appendChild(titleElem);

            const textElem = document.createElement('div');
            outputContainer.appendChild(textElem);

            let titleChars = post.title.split('');
            let textChars = post.text.split('');
            
            let tIdx = 0;
            let txtIdx = 0;

            // Schreibmaschineneffekt für Titel
            function typeTitle() {
                if (tIdx < titleChars.length) {
                    titleElem.textContent += titleChars[tIdx];
                    tIdx++;
                    typingTimeout = setTimeout(typeTitle, 40);
                } else {
                    // Zeilenumbruch nach Titel
                    textElem.innerHTML += '<br><br>';
                    setTimeout(typeText, 200);
                }
            }

            // Schreibmaschineneffekt für den Textkörper
            function typeText() {
                if (txtIdx < textChars.length) {
                    let char = textChars[txtIdx];
                    if (char === '\n') {
                        textElem.innerHTML += '<br>';
                    } else {
                        textElem.innerHTML += char;
                    }
                    txtIdx++;
                    // Leichte Variation für menschlicheres Tippen
                    let speed = Math.random() * 30 + 20; 
                    typingTimeout = setTimeout(typeText, speed);
                }
            }

            typeTitle();
        }
    </script>
</body>
</html>
