<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MELODIENRAUSCH</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Die Oswald-Schriftart für die Brutalismus-Titel und Caveat für die roten Handschrift-Akzente -->
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    /* ==========================================================================
       MELODIENRAUSCH - Underground Techno Poster Redesign
       ========================================================================== */

    /* 1. Hintergrund: Rohe, helle Sichtbeton-Textur */
    html, body {
      background-color: #d1d1d1; /* Hellgrauer Sichtbeton-Grundton */
      background-image: 
        linear-gradient(rgba(240, 240, 240, 0.3), rgba(220, 220, 220, 0.3)),
        url('https://unsplash.com'); /* Textur mit Rissen und Poren */
      background-size: cover;
      background-attachment: fixed;
      background-blend-mode: multiply;
      color: #000000; /* Schwarze Schrift für harten Kontrast */
      font-family: Arial, Helvetica, sans-serif;
      margin: 0; padding: 0;
      box-sizing: border-box;
      cursor: none; /* Deaktiviert den Standard-Cursor für deinen Custom-Cursor */
      overflow-x: hidden;
    }

    /* 2. Rauer, abgenutzter Gesamteindruck (Overlay-Körnung) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* 3. Übergroße, schwarze, überlagernde Typografie im Hintergrund */
    .bg-typography {
      position: fixed;
      font-family: 'Oswald', sans-serif;
      font-size: 28vw;
      font-weight: 700;
      color: rgba(0, 0, 0, 0.85); /* Dominantes Plakat-Schwarz */
      text-transform: uppercase;
      line-height: 0.8;
      letter-spacing: -0.05em;
      z-index: 1;
      pointer-events: none;
      white-space: nowrap;
    }

    .bg-text-1 { top: -5%; left: -5%; transform: rotate(-3deg); }
    .bg-text-2 { bottom: -2%; right: -5%; font-size: 32vw; transform: rotate(1deg); }

    /* 4. Custom Cursor */
    .custom-cursor {
      width: 14px; height: 14px;
      background-color: #000000;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 999999 !important;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    /* 5. Seiten-Struktur und Animationen */
    .main-content {
      opacity: 0;
      transition: opacity 0.8s ease;
      height: 250vh; 
      position: relative;
      z-index: 5; /* Liegt über der Hintergrundschrift */
    }
    
    body.intro-done .main-content {
      opacity: 1;
    }

    .hero-header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 30px 40px 10px 40px;
      box-sizing: border-box;
      z-index: 100;
      background: transparent;
    }

    .huge-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(30px, 7.8vw, 180px);
      font-weight: 700; line-height: 0.8; letter-spacing: -2px;
      text-transform: uppercase; margin: 0; white-space: nowrap;
      color: #000000;
    }

    /* 6. Menü-Icon (Schwarz auf Beton) */
    .menu-icon {
      display: flex; flex-direction: column; justify-content: space-between;
      width: 30px; height: 16px; cursor: none; margin-bottom: 8px; z-index: 1001;
      pointer-events: auto;
    }

    .menu-icon span {
      display: block; width: 100%; height: 2px;
      background-color: #000000; transition: all 0.3s ease-in-out;
    }

    body.menu-open .menu-icon span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    body.menu-open .menu-icon span:nth-child(2) { opacity: 0; }
    body.menu-open .menu-icon span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* 7. Side Menu (Analog/Brutalistischer Look) */
    .side-menu {
      position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
      background-color: #e5e5e5; border-left: 4px solid #000000;
      box-sizing: border-box; padding: 120px 40px 40px 40px; z-index: 1000;
      transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
      display: flex; flex-direction: column; gap: 10px;
    }

    body.menu-open .side-menu { right: 0; }

    .menu-link {
      font-family: 'Oswald', sans-serif; font-size: 32px; color: #000000;
      text-decoration: none; text-transform: uppercase; padding: 15px 20px;
      border: 2px solid transparent; transition: all 0.2s ease; display: block; cursor: none;
    }

    .menu-link:hover { 
      background-color: #000000; 
      color: #ffffff;
      border-color: #000000; 
      padding-left: 30px; 
    }

    /* 8. Layout-Grid und Elemente */
    .section-grid {
      display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px;
      padding: 240px 40px 40px 40px; align-items: start; position: relative;
      height: 100vh; box-sizing: border-box;
    }

    .meta-block {
      grid-column: 1 / 4; font-family: 'Oswald', sans-serif; font-size: 15px;
      line-height: 1.3; text-transform: uppercase; position: relative; z-index: 101;
      color: #000000;
    }

    /* 9. Werke & Medien-Boxen (Kontrastreich, analoger Plakat-Look) */
    .media-box { grid-column: 4 / 10; height: 520px; position: relative; }
    
    .hero-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('profilbilld.png'); background-size: cover;
      background-position: center 15%; background-repeat: no-repeat;
      z-index: 50; transform-origin: center center; will-change: transform, width, height, position;
      
      /* Plakat-Effekte für Bilder: */
      filter: grayscale(20%) contrast(125%) brightness(95%);
      border: 4px solid #000000;
      box-shadow: 10px 10px 0px #000000; /* Harter Kantenschatten */
    }

    .desc-block {
      grid-column: 10 / 13; font-family: Arial, Helvetica, sans-serif; font-size: 13px;
      line-height: 1.6; color: #000000; position: relative; z-index: 101;
    }

    /* 10. Rote Handschrift-Akzente */
    .red-accent-text {
      font-family: 'Caveat', cursive, sans-serif;
      color: #d61c1c; /* Intensives Signalrot */
      font-size: 3.5rem;
      text-transform: lowercase;
      transform: rotate(-6deg) translateY(-10px);
      display: inline-block;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Übergroße Typografie im Seitenhintergrund -->
  <div class="bg-typography bg-text-1">INTRO</div>
  <div class="bg-typography bg-text-2">29</div>

  <!-- Custom Cursor Quadrat -->
  <div class="custom-cursor"></div>

  <!-- Intro-Screen (Inhalt bricht hier ab, wird im Browser geladen) -->
  <div id="intro-screen" style="position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; z-index:9999999; transition:opacity 0.6s ease;">
    <div style="font-family:'Oswald', sans-serif;">Loading...</div>
  </div>

  <!-- Der Hauptinhalt deiner Seite -->
  <div class="main-content">
    <!-- Header, Menü und deine Sektionen folgen hier wie gewohnt... -->
  </div>

</body>
</html>
