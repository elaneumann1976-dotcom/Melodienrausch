<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MELODIENRAUSCH // CATALOG</title>
  <style>
    @import url('https://googleapis.com');
    :root { --bg: #0a0a0a; --fg: #ece7dd; --accent: #d97a3c; --muted: #444444; }
    html, body { background-color: var(--bg) !important; color: var(--fg); font-family: "IBM Plex Mono", monospace; margin: 0; padding: 0; box-sizing: border-box; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
    .custom-cursor { width: 12px; height: 12px; background-color: var(--fg); position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999 !important; transform: translate(-50%, -50%) rotate(45deg); will-change: transform; }
    header { padding: 4rem 2rem 2rem 2rem; border-bottom: 1px solid var(--muted); display: flex; justify-content: space-between; align-items: flex-end; }
    header h1 { font-family: "Arial Black", sans-serif; font-size: clamp(2.2rem, 7vw, 4.5rem); margin: 0; letter-spacing: -0.04em; line-height: 0.9; text-transform: uppercase; }
    header .index-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted); margin-bottom: 0.8rem; }
    .menu-icon { display: flex; flex-direction: column; justify-content: space-between; width: 28px; height: 14px; cursor: none; margin-bottom: 8px; z-index: 1010; pointer-events: auto; }
    .menu-icon span { display: block; width: 100%; height: 2px; background-color: var(--fg); transition: all 0.25s ease; }
    body.menu-open .menu-icon span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    body.menu-open .menu-icon span:nth-child(2) { opacity: 0; }
    body.menu-open .menu-icon span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    .side-menu { position: fixed; top: 0; right: -420px; width: 380px; height: 100vh; background-color: #0f0f0f; border-left: 1px solid var(--muted); box-sizing: border-box; padding: 120px 30px 40px 30px; z-index: 1000; transition: right 0.4s ease; display: flex; flex-direction: column; gap: 8px; }
    body.menu-open .side-menu { right: 0; }
    .menu-link { font-family: 'Oswald', sans-serif; font-size: 28px; color: var(--fg); text-transform: uppercase; padding: 12px 16px; text-decoration: none; display: block; cursor: none; }
    .menu-link:hover { color: var(--accent); }
    .section-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; padding: 4rem 2rem; align-items: start; box-sizing: border-box; }
    .meta-block { grid-column: 1 / 4; font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
    .werk-nav { display: flex; gap: 24px; margin-top: 20px; font-size: 24px; }
    .werk-nav button { background: none; border: none; padding: 0; font-family: inherit; color: var(--fg); cursor: none; pointer-events: auto; }
    .werk-nav button:disabled { opacity: 0.2; }
    .media-box { grid-column: 4 / 10; height: 500px; position: relative; border: 1px solid var(--muted); background: #000; }
    .hero-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .werk-num-big { font-family: 'Oswald', sans-serif; font-size: clamp(100px, 16vw, 340px); letter-spacing: -6px; color: var(--fg); opacity: 0.08; pointer-events: none; }
    .desc-block { grid-column: 10 / 13; font-size: 13px; }
    .werk-title { font-family: "Arial Black", sans-serif; font-size: 18px; text-transform: uppercase; line-height: 1.1; margin-bottom: 15px; color: var(--accent); }
    .werk-manifest { font-style: italic; margin-bottom: 25px; opacity: 0.8; color: var(--fg); line-height: 1.5; }
    .werk-fields { text-transform: uppercase; font-size: 11px; padding-top: 15px; border-top: 1px solid var(--muted); }
    .werk-fields div { display: flex; justify-content: space-between; padding: 5px 0; }
    footer { padding: 2rem; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: auto; }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>
  <div class="side-menu">
    <a href="index.html" class="menu-link">Heimat</a>
    <a href="register.html" class="menu-link">Register</a>
    <a href="kontakt.html" class="menu-link">Kontakt</a>
  </div>
  <header>
    <div><div class="index-tag">Auszug — Werkkatalog</div><h1>MELODIENRAUSCH<sup>®</sup></h1></div>
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  </header>
  <main class="section-grid">
    <div class="meta-block">WERK // KATALOG<br><br><strong>INDEX: <span id="werk-index">01/02</span></strong><div class="werk-nav"><button id="prev-btn" onclick="prevWerk()">◂</button><button id="next-btn" onclick="nextWerk()">▸</button></div></div>
    <div class="media-box"><div class="hero-img"><span class="werk-num-big" id="werk-num-big">01</span></div></div>
    <div class="desc-block">
      <div class="werk-title" id="werk-title">-</div><div class="werk-manifest" id="werk-manifest">-</div>
      <div class="werk-fields">
        <div><span>Technik</span><span id="werk-tech">-</span></div><div><span>Format</span><span id="werk-size">-</span></div><div><span>Jahr</span><span id="werk-year">-</span></div><div><span>Status</span><span id="werk-status">-</span></div>
      </div>
    </div>
  </main>
  <footer>ogcvisualz &nbsp;/&nbsp; mail@melodienrausch.de</footer>
  <script>
    const werke = [
      { num: '01', title: 'BASS & STILLE IN MEINEM KOPF', manifest: '„Das hier ist kein herkömmliches Portfolio, sondern ein digitales Underground-Magazin.“', tech: 'Bitumen auf Beton', size: '60 × 80 cm', year: '2026', status: 'Archiv' },
      { num: '02', title: 'URBANER FREQUENZ-KOLLAPS', manifest: '„Fragmente, die sich weigern, eine schnelle digitale Antwort zu geben.“', tech: 'Mischtechnik', size: '100 × 100 cm', year: '2026', status: 'Verfügbar' }
    ];
    let currentIndex = 0;
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => { cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) rotate(45deg)`; });
    function toggleMenu() { document.body.classList.toggle('menu-open'); }
    function updateWerkUI() {
      const w = werke[currentIndex];
      document.getElementById('werk-index').innerText = `${String(currentIndex+1).padStart(2,'0')}/${String(werke.length).padStart(2,'0')}`;
      document.getElementById('werk-num-big').innerText = w.num;
      document.getElementById('werk-title').innerText = w.title;
      document.getElementById('werk-manifest').innerText = w.manifest;
      document.getElementById('werk-tech').innerText = w.tech;
      document.getElementById('werk-size').innerText = w.size;
      document.getElementById('werk-year').innerText = w.year;
      document.getElementById('werk-status').innerText = w.status;
      document.getElementById('prev-btn').disabled = (currentIndex === 0);
      document.getElementById('next-btn').disabled = (currentIndex === werke.length - 1);
    }
    window.addEventListener('DOMContentLoaded', updateWerkUI);
    function nextWerk() { if(currentIndex < werke.length-1) { currentIndex++; updateWerkUI(); } }
    function prevWerk() { if(currentIndex > 0) { currentIndex--; updateWerkUI(); } }
  </script>
</body>
</html>
