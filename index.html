<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELODIENRAUSCH</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  html, body {
    background-color: #ffffff;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0; padding: 0;
    box-sizing: border-box;
    cursor: none;
  }

  .custom-cursor {
    width: 14px; height: 14px;
    background-color: #000000;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 999999 !important;
    transform: translate(-50%, -50%) rotate(45deg);
  }

  /* Ändert die Cursor-Farbe auf weiß, wenn man über das schwarze Menü fährt */
  body.menu-open .custom-cursor {
    background-color: #ffffff;
  }

  .main-content {
    opacity: 0;
    transition: opacity 0.8s ease;
    height: 250vh; 
  }
  body.intro-done .main-content {
    opacity: 1;
  }

  .hero-header {
    position: fixed;
    top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 30px 40px 10px 40px;
    box-sizing: border-box;
    z-index: 100;
  }

  .huge-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(30px, 7.8vw, 180px);
    font-weight: 700; line-height: 0.8; letter-spacing: -2px;
    text-transform: uppercase; margin: 0; white-space: nowrap;
  }

  .menu-icon {
    display: flex; flex-direction: column; justify-content: space-between;
    width: 30px; height: 16px; cursor: none; margin-bottom: 8px; z-index: 1001;
    pointer-events: auto;
  }

  .menu-icon span {
    display: block; width: 100%; height: 2px;
    background-color: #000000; transition: all 0.3s ease-in-out;
  }

  /* Macht die Linien des X-Buttons weiß, wenn das Menü offen ist */
  body.menu-open .menu-icon span {
    background-color: #ffffff;
  }

  body.menu-open .menu-icon span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  body.menu-open .menu-icon span:nth-child(2) { opacity: 0; }
  body.menu-open .menu-icon span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Hintergrundfarbe hier komplett auf tiefes Schwarz gesetzt */
  .side-menu {
    position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
    background-color: #000000; border-left: 1px solid #111111;
    box-sizing: border-box; padding: 120px 40px 40px 40px; z-index: 1000;
    transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
    display: flex; flex-direction: column; gap: 10px;
  }

  body.menu-open .side-menu { right: 0; }

  .menu-link {
    font-family: 'Oswald', sans-serif; font-size: 32px; color: #ffffff;
    text-decoration: none; text-transform: uppercase; padding: 15px 20px;
    border: 1px solid transparent; transition: all 0.2s ease; display: block; cursor: none;
    border-bottom: 1px solid #222222; /* Dezente Trennlinie im Menü */
  }

  /* Hover-Effekt: Text wird schwarz, Hintergrund weiß */
  .menu-link:hover { background-color: #ffffff; color: #000000; border-color: #ffffff; padding-left: 30px; }

  .section-grid {
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px;
    padding: 240px 40px 40px 40px; align-items: start; position: relative;
    height: 100vh; box-sizing: border-box;
  }

  .meta-block {
    grid-column: 1 / 4; font-family: 'Oswald', sans-serif; font-size: 15px;
    line-height: 1.3; text-transform: uppercase; position: relative; z-index: 101;
  }

  .media-box { grid-column: 4 / 10; height: 520px; position: relative; }
  
  .hero-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('profilbilld.png'); background-size: cover;
    background-position: center 15%; background-repeat: no-repeat;
    z-index: 50; transform-origin: center center; will-change: transform, width, height, position;
  }

  .desc-block {
    grid-column: 10 / 13; font-family: Arial, Helvetica, sans-serif; font-size: 13px;
    line-height: 1.6; color: #000000; position: relative; z-index: 101;
  }
</style>
</head>
<body>

  <div id="intro-screen" style="position:fixed; top:0; left:0; width:100%; height:100vh; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; z-index:9999999; transition:opacity 0.6s ease;"><div style="font-family:'Courier New'; font-size:24px; letter-spacing:10px; text-transform:uppercase; font-weight:bold;">melodienrausch</div></div>
  <div class="custom-cursor" id="cursor"></div>

<div class="side-menu">
    <a href="ueber.html" class="menu-link">Über</a>
    <a href="werke.html" class="menu-link">Werke</a>
    <a href="register.html" class="menu-link">Register</a>
    <a href="kontakt.html" class="menu-link">Kontakt</a>
</div>

  <div class="main-content">
    <div class="hero-header">
      <h1 class="huge-title">MELODIENRAUSCH®</h1>
      <div class="menu-icon" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="section-grid">
      <div class="meta-block">
        DAS IST EIN RAUM FÜR ENTDECKUNG <br><br><br><br>
        <strong>INDEX &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 1/2</strong>
      </div>

      <div class="media-box">
        <div class="hero-img" id="zoomImage"></div>
      </div>

      <div class="desc-block">
        <strong>ÜBER DIE STRUKTUR</strong><br><br>
        Ich verbinde hier Fragmente aus Kunst, Sound und rohem Text. Keine Filter. Alltagssprache, ungekürzt und echt. Keine Regeln, nur Präsenz und Material.
      </div>
    </div>
  </div>

<script>
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  });

  function toggleMenu() { document.body.classList.toggle('menu-open'); }

  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const intro = document.getElementById('intro-screen');
      if(intro) { intro.style.opacity = '0'; setTimeout(() => intro.remove(), 600); }
      document.body.classList.add('intro-done');
    }, 2000); 
  });

  const zoomImage = document.getElementById('zoomImage');
  window.addEventListener('scroll', () => {
    let scrollPos = window.scrollY;
    if (scrollPos > 10) {
      zoomImage.style.position = 'fixed'; zoomImage.style.top = '0'; zoomImage.style.left = '0'; zoomImage.style.width = '100vw'; zoomImage.style.height = '100vh';
      let zoomFaktor = 1 + (scrollPos * 0.002); if(zoomFaktor > 2.2) zoomFaktor = 2.2; 
      zoomImage.style.transform = `scale(${zoomFaktor})`;
    } else {
      zoomImage.style.position = 'absolute'; zoomImage.style.width = '100%'; zoomImage.style.height = '100%'; zoomImage.style.transform = 'scale(1)';
    }
  });
</script>
</body>
</html>
